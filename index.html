                <div className="flex h-16 w-16 items-center justify-center rounded-[22px] bg-white/12 text-3xl">👤</div>
                <div>
                  <div className="text-lg font-black">山田 太郎さん</div>
                  <div className="mt-1 text-[11px] text-slate-200">会員ID: AQZ000345</div>
                  <div className="mt-2 inline-flex rounded-full bg-white/12 px-3 py-1 text-[10px] font-black text-cyan-100">
                    {supported ? "サポーター会員" : "無料メンバー"}
                  </div>
                </div>
              </div>
            </div>

            <SurfaceCard className="mt-4">
              <div className="text-xs font-black uppercase tracking-[0.18em] text-[#5a78b5]">応援中の生き物</div>
              <div className="mt-3 flex items-center gap-3">
                <div className="w-24 shrink-0">
                  <ArtCanvas animal={animal} label={animal.name} compact />
                </div>
                <div>
                  <div className="text-sm font-black text-[#11284f]">{animal.name}</div>
                  <div className="mt-1 text-[11px] text-slate-500">{supported ? selectedPlan.label : "まだ応援を開始していません"}</div>
                </div>
              </div>
            </SurfaceCard>

            <div className="mt-4 grid gap-3">
              <MenuRow icon={Bell} label="お知らせ" value="新着を確認する" onClick={onOpenNotifications} />
              <MenuRow icon={Trophy} label="ランキング" value="みんなの応援を見る" onClick={onOpenRankings} />
              <MenuRow icon={CalendarDays} label="体験イベント" value="参加できる企画を探す" onClick={onOpenEvents} />
              <MenuRow icon={CreditCard} label="会員証を開く" value="特典やQRを確認する" onClick={onOpenMember} />
            </div>
          </ScreenBase>
        );
      }

      function NotificationsScreen({ filter, notificationsList, onFilterChange, onBack, onTabSelect }) {
        return (
          <ScreenBase className="bg-[#f7fbff]" bottomNav={<BottomNav active="mypage" onSelect={onTabSelect} />}>
            <StatusBar light />
            <ScreenHeader title="お知らせ" subtitle="運営からの最新情報" onBack={onBack} />

            <FilterTabs items={["すべて", "お知らせ", "イベント", "メンテナンス"]} active={filter} onSelect={onFilterChange} />

            <div className="mt-4 grid gap-3">
              {notificationsList.map((notice) => {
                const animal = findAnimal(notice.animalId);
                return (
                  <SurfaceCard key={notice.id} className="flex items-start gap-3">
                    <div className="w-20 shrink-0">
                      <ArtCanvas animal={animal} label={animal.name} compact />
                    </div>
                    <div className="min-w-0 flex-1">
                      <div className="flex items-center gap-2">
                        <div className="text-[10px] font-black uppercase tracking-[0.18em] text-[#5a78b5]">{notice.kind}</div>
                        {notice.unread ? <span className="h-2 w-2 rounded-full bg-[#ff6d55]" /> : null}
                      </div>
                      <div className="mt-2 text-sm font-black text-[#11284f]">{notice.title}</div>
                      <div className="mt-2 text-[11px] leading-5 text-slate-500">{notice.excerpt}</div>
                      <div className="mt-2 text-[10px] text-slate-400">{notice.date}</div>
                    </div>
                  </SurfaceCard>
                );
              })}
            </div>
          </ScreenBase>
        );
      }

      function RankingsScreen({ range, onRangeChange, onBack, onTabSelect }) {
        const rows = rankingRows[range];

        return (
          <ScreenBase className="bg-[#f7fbff]" bottomNav={<BottomNav active="mypage" onSelect={onTabSelect} />}>
            <StatusBar light />
            <ScreenHeader title="ランキング" subtitle="みんなの応援を、動物ごとに見える化。" onBack={onBack} />

            <FilterTabs items={["今月", "先月", "累計"]} active={range} onSelect={onRangeChange} />

            <div className="mt-4 grid gap-3">
              {rows.map((row) => {
                const animal = findAnimal(row.animalId);
                return (
                  <SurfaceCard key={`${range}-${row.rank}-${row.animalId}`} className="flex items-center gap-3">
                    <div className="w-5 text-center text-sm font-black text-slate-400">{row.rank}</div>
                    <div className="w-16 shrink-0">
                      <ArtCanvas animal={animal} label={animal.name} compact />
                    </div>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-black text-[#11284f]">{animal.name}</div>
                      <div className="mt-1 text-[11px] text-slate-500">動物別応援ランキング</div>
                    </div>
                    <div className="text-[11px] font-black text-[#173e72]">{row.value}</div>
                  </SurfaceCard>
                );
              })}
            </div>

            <SurfaceCard className="mt-4">
              <div className="text-sm font-black text-[#11284f]">応援の声</div>
              <div className="mt-3 grid gap-3">
                {supporterVoices.map((voice) => (
                  <div key={voice.id} className="rounded-[18px] bg-slate-50 px-4 py-3">
                    <div className="text-sm font-black text-[#11284f]">{voice.name}</div>
                    <div className="mt-1 text-[11px] text-slate-500">{voice.meta}</div>
                  </div>
                ))}
              </div>
            </SurfaceCard>
          </ScreenBase>
        );
      }

      function EventsScreen({ onOpenEvent, onBack, onTabSelect }) {
        return (
          <ScreenBase className="bg-[#f7fbff]" bottomNav={<BottomNav active="mypage" onSelect={onTabSelect} />}>
            <StatusBar light />
            <ScreenHeader title="体験・イベント" subtitle="現地での体験を、推しとのつながりに変える。" onBack={onBack} />

            <div className="mt-4 grid gap-3">
              {events.map((event) => {
                const animal = findAnimal(event.animalId);
                return (
                  <button key={event.id} type="button" onClick={() => onOpenEvent(event.id)} className="block w-full text-left">
                    <SurfaceCard>
                      <ArtCanvas animal={animal} label={event.date} detail={event.title} />
                      <div className="mt-3 text-[11px] leading-6 text-slate-500">{event.summary}</div>
                    </SurfaceCard>
                  </button>
                );
              })}
            </div>
          </ScreenBase>
        );
      }

      function EventDetailScreen({ event, onBack }) {
        const animal = findAnimal(event.animalId);

        return (
          <ScreenBase className="bg-[#f7fbff]">
            <StatusBar light />
            <ScreenHeader title="イベント詳細" subtitle={event.title} onBack={onBack} />

            <div className="mt-4">
              <ArtCanvas animal={animal} label={event.date} detail={event.title} />
            </div>

            <SurfaceCard className="mt-4">
              <div className="text-sm leading-7 text-slate-600">{event.summary}</div>
              <div className="mt-4 grid gap-3">
                <DetailRow label="日時" value={event.date} />
                <DetailRow label="場所" value={event.place} />
                <DetailRow label="参加費" value={event.fee} />
                <DetailRow label="定員" value={event.capacity} />
              </div>
            </SurfaceCard>

            <PrimaryButton className="mt-6 w-full" onClick={() => alert("申し込み処理が実行されました。")}>
              申し込む
            </PrimaryButton>
          </ScreenBase>
        );
      }

      function DesktopHero() {
        return (
          <div className="rounded-[36px] border border-white/12 bg-[linear-gradient(155deg,#081a32_0%,#0f2946_58%,#103e68_100%)] p-7 text-white shadow-[0_34px_90px_rgba(6,24,46,0.18)]">
            <div className="inline-flex rounded-full border border-white/15 bg-white/10 px-4 py-2 text-[11px] font-black uppercase tracking-[0.18em] text-cyan-100">
              Aqzoo App
            </div>
            <h1 className="mt-5 font-display text-5xl font-black leading-[1.02] tracking-[-0.05em]">
              あなたの「推し」を、
              <br />
              毎月応援できる。
            </h1>
            <p className="mt-5 text-sm leading-8 text-slate-200">
              ホーム、応援、活動レポート、会員証、通知、ランキング、イベントを、参考画像の導線に沿ってそのまま触れるモバイル体験として再構成しました。
            </p>

            <div className="mt-6 grid gap-3">
              {desktopFeatures.map((feature) => (
                <div key={feature.title} className="rounded-[24px] border border-white/10 bg-white/10 p-4 backdrop-blur">
                  <div className="flex items-start gap-3">
                    <div className="flex h-11 w-11 items-center justify-center rounded-2xl bg-white/10 text-cyan-100">
                      <feature.icon className="h-5 w-5" />
                    </div>
                    <div>
                      <div className="text-sm font-black">{feature.title}</div>
                      <div className="mt-2 text-[11px] leading-6 text-slate-200">{feature.text}</div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function DesktopFlow() {
        return (
          <div className="rounded-[30px] border border-slate-200 bg-white/90 p-5 shadow-[0_22px_70px_rgba(17,40,79,0.08)] backdrop-blur">
            <div className="text-xs font-black uppercase tracking-[0.18em] text-[#5a78b5]">ユーザー体験フロー</div>
            <div className="mt-4 grid gap-3">
              {experienceFlow.map((step, index) => (
                <div key={step} className="flex items-start gap-3">
                  <div className="flex h-8 w-8 items-center justify-center rounded-full bg-[#eff5ff] text-[11px] font-black text-[#1656d9]">
                    {index + 1}
                  </div>
                  <div className="pt-1 text-sm leading-6 text-slate-600">{step}</div>
                </div>
              ))}
            </div>
          </div>
        );
      }

      function ShortcutButton({ label, active = false, onClick }) {
        return (
          <button
            type="button"
            onClick={onClick}
            className={classNames(
              "rounded-[18px] px-4 py-3 text-left text-sm font-black transition",
              active ? "bg-[#1656d9] text-white shadow-[0_18px_34px_rgba(22,86,217,0.24)]" : "bg-[#eff5ff] text-[#1656d9]"
            )}
          >
            {label}
          </button>
        );
      }

      function App() {
        const rootScreens = React.useMemo(() => new Set(["home", "discover", "reports", "member", "mypage"]), []);

        const [stack, setStack] = React.useState(["home"]);
        const [selectedAnimalId, setSelectedAnimalId] = React.useState("penguin");
        const [selectedPlanId, setSelectedPlanId] = React.useState("starter");
        
        // 状態管理を個別化
        const [supportedAnimals, setSupportedAnimals] = React.useState({});
        const [followedAnimals, setFollowedAnimals] = React.useState({ penguin: true });
        
        const [reportFilter, setReportFilter] = React.useState("すべて");
        const [noticeFilter, setNoticeFilter] = React.useState("すべて");
        const [selectedReportId, setSelectedReportId] = React.useState(reports[0].id);
        const [selectedEventId, setSelectedEventId] = React.useState(events[0].id);
        const [rankingRange, setRankingRange] = React.useState("今月");
        const [notificationCount, setNotificationCount] = React.useState(3);

        const selectedAnimal = findAnimal(selectedAnimalId);
        
        // 選択された動物ごとの応援状況を取得
        const isSupported = !!supportedAnimals[selectedAnimalId];
        const activePlanId = supportedAnimals[selectedAnimalId] || "starter";
        const selectedPlan = supportPlans.find((plan) => plan.id === activePlanId) ?? supportPlans[0];
        
        const selectedReport = reports.find((report) => report.id === selectedReportId) ?? reports[0];
        const selectedEvent = events.find((event) => event.id === selectedEventId) ?? events[0];
        const deferredReportFilter = React.useDeferredValue(reportFilter);
        const deferredNoticeFilter = React.useDeferredValue(noticeFilter);
        const currentScreen = stack[stack.length - 1];
        const activeRoot = [...stack].reverse().find((screen) => rootScreens.has(screen)) ?? "home";
        
        const hasAnySupport = Object.keys(supportedAnimals).length > 0;
        const rankProgress = hasAnySupport ? 72 : 38;

        const filteredReports = React.useMemo(() => {
          return reports.filter((report) => {
            if (deferredReportFilter !== "すべて" && report.category !== deferredReportFilter) {
              return false;
            }
            if (activeRoot === "discover" || currentScreen === "support") {
              return report.animalId === selectedAnimalId;
            }
            return true;
          });
        }, [currentScreen, activeRoot, deferredReportFilter, selectedAnimalId]);

        const filteredNotifications = React.useMemo(() => {
          return notifications.filter((notice) => {
            if (deferredNoticeFilter === "すべて") {
              return true;
            }
            return notice.kind === deferredNoticeFilter;
          });
        }, [deferredNoticeFilter]);

        const resetTo = (screen) => {
          React.startTransition(() => {
            setStack([screen]);
          });
        };

        const push = (screen) => {
          React.startTransition(() => {
            setStack((current) => [...current, screen]);
          });
        };

        const goBack = () => {
          React.startTransition(() => {
            setStack((current) => (current.length > 1 ? current.slice(0, -1) : current));
          });
        };

        const openAnimal = (animalId) => {
          setSelectedAnimalId(animalId);
          resetTo("discover");
        };

        const openSupport = () => {
          push("support");
        };

        const completeSupport = () => {
          setSupportedAnimals((prev) => ({ ...prev, [selectedAnimalId]: selectedPlanId }));
          setNotificationCount((current) => current + 1);
          push("support-success");
        };

        const toggleFollow = () => {
          setFollowedAnimals((prev) => ({ ...prev, [selectedAnimalId]: !prev[selectedAnimalId] }));
        };

        const openReport = (reportId) => {
          setSelectedReportId(reportId);
          push("report-detail");
        };

        const openEvent = (eventId) => {
          setSelectedEventId(eventId);
          push("event-detail");
        };

        let screen = null;

        if (currentScreen === "home") {
          screen = (
            <HomeScreen
              selectedAnimal={selectedAnimal}
              notificationCount={notificationCount}
              supported={isSupported}
              onSelectAnimal={openAnimal}
              onOpenSupport={openSupport}
              onOpenReports={() => resetTo("reports")}
              onOpenRankings={() => push("rankings")}
              onOpenEvents={() => push("events")}
              onOpenNotifications={() => push("notifications")}
              onTabSelect={resetTo}
            />
          );
        } else if (currentScreen === "discover") {
          screen = (
            <DiscoverScreen
              animal={selectedAnimal}
              supported={isSupported}
              followed={!!followedAnimals[selectedAnimalId]}
              onToggleFollow={toggleFollow}
              onOpenSupport={openSupport}
              onOpenReports={() => resetTo("reports")}
              onSelectAnimal={openAnimal}
              onTabSelect={resetTo}
            />
          );
        } else if (currentScreen === "support") {
          screen = (
            <SupportScreen
              animal={selectedAnimal}
              selectedPlanId={selectedPlanId}
              onSelectPlan={setSelectedPlanId}
              onBack={goBack}
              onConfirm={completeSupport}
            />
          );
        } else if (currentScreen === "support-success") {
          screen = (
            <SupportSuccessScreen
              animal={selectedAnimal}
              selectedPlan={selectedPlan}
              onViewAnimal={() => resetTo("discover")}
              onViewReports={() => resetTo("reports")}
            />
          );
        } else if (currentScreen === "reports") {
          screen = (
            <ReportsScreen
              filter={reportFilter}
              filteredReports={filteredReports}
              onFilterChange={setReportFilter}
              onOpenReport={openReport}
              onTabSelect={resetTo}
            />
          );
        } else if (currentScreen === "report-detail") {
          screen = (
            <ReportDetailScreen
              report={selectedReport}
              onBack={goBack}
              onOpenSupport={() => {
                setSelectedAnimalId(selectedReport.animalId);
                setStack(["discover", "support"]);
              }}
            />
          );
        } else if (currentScreen === "member") {
          screen = (
            <MemberScreen
              animal={selectedAnimal}
              supported={isSupported}
              selectedPlan={selectedPlan}
              rankProgress={rankProgress}
              onTabSelect={resetTo}
            />
          );
        } else if (currentScreen === "mypage") {
          screen = (
            <MyPageScreen
              animal={selectedAnimal}
              supported={isSupported}
              selectedPlan={selectedPlan}
              onOpenNotifications={() => push("notifications")}
              onOpenRankings={() => push("rankings")}
              onOpenEvents={() => push("events")}
              onOpenMember={() => resetTo("member")}
              onTabSelect={resetTo}
            />
          );
        } else if (currentScreen === "notifications") {
          screen = (
            <NotificationsScreen
              filter={noticeFilter}
              notificationsList={filteredNotifications}
              onFilterChange={setNoticeFilter}
              onBack={goBack}
              onTabSelect={resetTo}
            />
          );
        } else if (currentScreen === "rankings") {
          screen = (
            <RankingsScreen
              range={rankingRange}
              onRangeChange={setRankingRange}
              onBack={goBack}
              onTabSelect={resetTo}
            />
          );
        } else if (currentScreen === "events") {
          screen = <EventsScreen onOpenEvent={openEvent} onBack={goBack} onTabSelect={resetTo} />;
        } else {
          screen = <EventDetailScreen event={selectedEvent} onBack={goBack} />;
        }

        return (
          <div className="min-h-screen bg-[radial-gradient(circle_at_top,rgba(126,241,255,0.14),transparent_24%),linear-gradient(180deg,#f7fbff_0%,#eef4fb_100%)]">
            <div className="mx-auto max-w-[1480px] px-4 py-5 md:px-6 xl:px-8">
              <div className="grid gap-6 xl:grid-cols-[380px_minmax(0,1fr)_300px]">
                <div className="hidden xl:grid content-start gap-6">
                  <DesktopHero />
                  <DesktopFlow />
                </div>

                <div className="flex flex-col items-center gap-4">
                  <div className="hidden lg:block xl:hidden w-full rounded-[30px] border border-white/60 bg-white/75 p-5 shadow-[0_20px_60px_rgba(17,40,79,0.08)] backdrop-blur">
                    <div className="inline-flex rounded-full bg-[#eff5ff] px-3 py-1 text-[11px] font-black uppercase tracking-[0.18em] text-[#1656d9]">
                      Aqzoo App
                    </div>
                    <div className="mt-3 text-3xl font-black tracking-[-0.05em] text-[#10233c]">
                      あなたの「推し」を、毎月応援できる。
                    </div>
                    <div className="mt-3 text-sm leading-7 text-slate-600">
                      参考画像の流れに沿って、ホームから応援、レポート、会員証まで操作できます。
                    </div>
                  </div>

                  <PhoneFrame>{screen}</PhoneFrame>
                </div>

                <div className="hidden xl:grid content-start gap-4">
                  <div className="rounded-[30px] border border-slate-200 bg-white/90 p-5 shadow-[0_22px_70px_rgba(17,40,79,0.08)] backdrop-blur">
                    <div className="text-xs font-black uppercase tracking-[0.18em] text-[#5a78b5]">ライブ状態</div>
                    <div className="mt-4 grid gap-3">
                      <div className="rounded-[20px] bg-slate-50 px-4 py-3">
                        <div className="text-[10px] font-black uppercase tracking-[0.18em] text-slate-400">現在の画面</div>
                        <div className="mt-2 text-sm font-black text-[#11284f]">
                          {tabItems.find((item) => item.key === activeRoot)?.label ?? currentScreen}
                        </div>
                      </div>
                      <div className="rounded-[20px] bg-slate-50 px-4 py-3">
                        <div className="text-[10px] font-black uppercase tracking-[0.18em] text-slate-400">選択中の生き物</div>
                        <div className="mt-2 text-sm font-black text-[#11284f]">{selectedAnimal.name}</div>
                      </div>
                      <div className="rounded-[20px] bg-slate-50 px-4 py-3">
                        <div className="text-[10px] font-black uppercase tracking-[0.18em] text-slate-400">応援状態</div>
                        <div className="mt-2 text-sm font-black text-[#11284f]">{isSupported ? `${selectedPlan.label} で応援中` : "未開始"}</div>
                      </div>
                    </div>
                  </div>

                  <div className="rounded-[30px] border border-slate-200 bg-white/90 p-5 shadow-[0_22px_70px_rgba(17,40,79,0.08)] backdrop-blur">
                    <div className="text-xs font-black uppercase tracking-[0.18em] text-[#5a78b5]">クイックジャンプ</div>
                    <div className="mt-4 grid gap-3">
                      <ShortcutButton label="ホーム" active={currentScreen === "home"} onClick={() => resetTo("home")} />
                      <ShortcutButton label="生き物詳細" active={currentScreen === "discover"} onClick={() => resetTo("discover")} />
                      <ShortcutButton label="応援プラン" active={currentScreen === "support"} onClick={() => setStack(["discover", "support"])} />
                      <ShortcutButton label="活動レポート" active={currentScreen === "reports" || currentScreen === "report-detail"} onClick={() => resetTo("reports")} />
                      <ShortcutButton label="会員証" active={currentScreen === "member"} onClick={() => resetTo("member")} />
                      <ShortcutButton label="お知らせ" active={currentScreen === "notifications"} onClick={() => setStack(["mypage", "notifications"])} />
                      <ShortcutButton label="ランキング" active={currentScreen === "rankings"} onClick={() => setStack(["mypage", "rankings"])} />
                      <ShortcutButton label="イベント" active={currentScreen === "events" || currentScreen === "event-detail"} onClick={() => setStack(["mypage", "events"])} />
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
