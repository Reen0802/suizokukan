<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aqzoo | 推しを毎月応援できるアプリ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+1p:wght@400;500;700;800&family=Shippori+Mincho:wght@600;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"M PLUS 1p"', '"Noto Sans JP"', "sans-serif"],
              display: ['"Shippori Mincho"', '"Noto Serif JP"', "serif"],
            },
          },
        },
      };
    </script>
    <script type="importmap">
      {
        "imports": {
          "react": "https://esm.sh/react@18.3.1?dev",
          "react/jsx-runtime": "https://esm.sh/react@18.3.1/jsx-runtime?dev",
          "react/jsx-dev-runtime": "https://esm.sh/react@18.3.1/jsx-dev-runtime?dev",
          "react-dom/client": "https://esm.sh/react-dom@18.3.1/client?dev",
          "framer-motion": "https://esm.sh/framer-motion@11.18.2?dev&external=react,react-dom",
          "lucide-react": "https://esm.sh/lucide-react@0.511.0?dev&external=react"
        }
      }
    </script>
    <style>
      :root { --ink: #10233c; --bg-top: #07192f; --bg-bottom: #f4fbff; }
      body {
        margin: 0; min-height: 100vh;
        background: radial-gradient(circle at top, rgba(126, 241, 255, 0.16), transparent 28%), linear-gradient(180deg, rgba(255, 255, 255, 0.32), rgba(244, 251, 255, 0.98)), var(--bg-bottom);
        font-family: "M PLUS 1p", "Noto Sans JP", sans-serif;
        color: var(--ink); -webkit-font-smoothing: antialiased;
      }
      @keyframes floatY { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script type="text/babel" data-type="module" data-presets="react">
import React from "react";
import { createRoot } from "react-dom/client";
import { Activity, ArrowLeft, BadgeCheck, Bell, ChevronRight, Heart, Home, Search, Ticket, User, MapPin, Waves, Trees, Building2, QrCode, CheckCircle2, Crown, Star, Camera, Activity as ActivityIcon, Trophy, CalendarDays, CreditCard } from "lucide-react";

// --- データ定義 ---
const facilities = [
  { id: "mirai-aqua", name: "ミライ水族館", category: "aquarium", location: "湾岸エリア" },
  { id: "deep-blue", name: "ディープブルー・シー", category: "aquarium", location: "海岬市" },
  { id: "savanna-forest", name: "サバンナの森動物園", category: "zoo", location: "丘陵エリア" },
  { id: "sky-garden", name: "スカイガーデン・パーク", category: "zoo", location: "高原市" },
];

const animals = [
  { id: "penguin-1", facilityId: "mirai-aqua", type: "penguin", name: "ペンギン", nickname: "ユキ", price: 500, tones: "from-slate-950 via-sky-800 to-cyan-400", summary: "ミライ水族館の人気者。光の演出に合わせて元気に泳ぎます。" },
  { id: "otter-1", facilityId: "mirai-aqua", type: "otter", name: "カワウソ", nickname: "キラ", price: 800, tones: "from-amber-900 via-orange-800 to-yellow-600", summary: "器用に手を使って遊ぶ、好奇心旺盛なカワウソ。" },
  { id: "dolphin-1", facilityId: "deep-blue", type: "dolphin", name: "イルカ", nickname: "ソラ", price: 1000, tones: "from-[#072847] via-[#1b5ea8] to-[#67c9ff]", summary: "深い青のプールで優雅に舞う、知能の高いイルカ。" },
  { id: "penguin-2", facilityId: "deep-blue", type: "penguin", name: "ペンギン", nickname: "ハル", price: 500, tones: "from-slate-800 via-blue-900 to-indigo-500", summary: "深い海の底をイメージした展示で暮らすペンギン。" },
  { id: "lion-1", facilityId: "savanna-forest", type: "lion", name: "ライオン", nickname: "レオ", price: 1000, tones: "from-[#2f1606] via-[#8c4b16] to-[#f4be63]", summary: "サバンナの王者にふさわしい、堂々とした風格。" },
  { id: "otter-2", facilityId: "savanna-forest", type: "otter", name: "コツメカワウソ", nickname: "モチ", price: 800, tones: "from-[#0f2137] via-[#365d7d] to-[#8ed5de]", summary: "森の川辺で仲良く暮らす、家族思いのカワウソ。" },
  { id: "lion-2", facilityId: "sky-garden", type: "lion", name: "ライオン", nickname: "シンバ", price: 1000, tones: "from-orange-950 via-red-900 to-amber-600", summary: "高原の風を感じながら、のんびりと過ごすライオン。" },
  { id: "dolphin-2", facilityId: "sky-garden", type: "dolphin", name: "イルカ", nickname: "ルナ", price: 1000, tones: "from-blue-950 via-indigo-800 to-purple-500", summary: "空を飛ぶように泳ぐ、ダイナミックなジャンプが自慢。" },
];

const reports = [
  { id: "r1", animalId: "penguin-1", category: "写真", date: "2026.06.28", title: "朝の体重チェック", excerpt: "今朝も元気に体重測定。安定した健康状態です。" },
  { id: "r2", animalId: "lion-1", category: "記録", date: "2026.06.25", title: "新しい遊具を導入", excerpt: "ライオンたちが新しいおもちゃに興味津々です。" },
  { id: "r3", animalId: "otter-1", category: "写真", date: "2026.06.20", title: "お昼寝の様子", excerpt: "仲間と身を寄せ合って眠る愛らしい姿。" },
];

const supportPlans = [
  { id: "starter", amount: 500, label: "500円 / 月", title: "気軽に応援プラン", perks: "毎月のレポート / 写真 / 会員証", recommended: true },
  { id: "grow", amount: 1000, label: "1,000円 / 月", title: "しっかり見守りプラン", perks: "月次まとめ / 限定先行レポート" },
];

// --- 共通コンポーネント ---
function classNames(...values) { return values.filter(Boolean).join(" "); }
function findAnimal(id) { return animals.find(a => a.id === id); }
function findFacility(id) { return facilities.find(f => f.id === id); }
function formatYen(v) { return `${v.toLocaleString("ja-JP")}円`; }
function formatImageUrl(type) {
  const urls = {
    penguin: "https://files.manuscdn.com/user_upload_by_module/session_file/310519663339388060/iMxoACEWDIwJDZap.jpg",
    otter: "https://files.manuscdn.com/user_upload_by_module/session_file/310519663339388060/nxNgSWdlEwjUoHyb.jpg",
    dolphin: "https://files.manuscdn.com/user_upload_by_module/session_file/310519663339388060/lQIBXQWAeqilFEVm.jpg",
    lion: "https://files.manuscdn.com/user_upload_by_module/session_file/310519663339388060/mRuBUjzsnVydBUZm.jpg",
  };
  return urls[type] || urls.penguin;
}

function PhoneFrame({ children }) {
  return (
    <div className="w-full max-w-[408px] rounded-[44px] border border-white/40 bg-white/65 p-2 shadow-2xl backdrop-blur">
      <div className="relative aspect-[390/844] overflow-hidden rounded-[34px] border border-white/70 bg-white">{children}</div>
    </div>
  );
}

function StatusBar({ light = false }) {
  return (
    <div className={classNames("flex items-center justify-between px-6 pt-4 text-[11px] font-black", light ? "text-slate-900" : "text-white")}>
      <span>9:41</span>
      <div className="flex items-center gap-1"><span className="h-2 w-2 rounded-full bg-current" /><span className="h-2 w-2 rounded-full bg-current" /></div>
    </div>
  );
}

function BottomNav({ active, onSelect }) {
  const items = [
    { key: "home", label: "ホーム", icon: Home },
    { key: "discover", label: "さがす", icon: Search },
    { key: "reports", label: "レポート", icon: ActivityIcon },
    { key: "member", label: "会員証", icon: Ticket },
    { key: "mypage", label: "マイページ", icon: User },
  ];
  return (
    <div className="absolute bottom-0 left-0 right-0 border-t border-slate-200 bg-white/92 px-4 pb-5 pt-3 backdrop-blur z-50">
      <div className="grid grid-cols-5 gap-2">
        {items.map((item) => (
          <button key={item.key} onClick={() => onSelect(item.key)} className={classNames("rounded-2xl px-2 py-2 text-center transition", item.key === active ? "bg-[#eaf1ff] text-[#1656d9]" : "text-slate-500")}>
            <item.icon className="mx-auto h-4 w-4" />
            <div className="mt-1 text-[10px] font-black">{item.label}</div>
          </button>
        ))}
      </div>
    </div>
  );
}

function ArtCanvas({ animal, label, compact = false }) {
  return (
    <div className={classNames("relative overflow-hidden rounded-[24px] bg-gradient-to-br", animal.tones, compact ? "h-24" : "h-48")}>
      <img src={formatImageUrl(animal.type)} className={classNames("absolute object-cover animate-[floatY_8s_ease-in-out_infinite]", compact ? "bottom-2 right-2 h-16 w-16" : "bottom-4 right-4 h-32 w-32")} />
      <div className="absolute inset-x-3 bottom-3"><div className="inline-flex rounded-full bg-white/10 px-2 py-0.5 text-[9px] font-black text-white backdrop-blur">{label}</div></div>
    </div>
  );
}

function ScreenHeader({ title, subtitle, onBack, light = true }) {
  return (
    <div className="mt-4 flex items-start gap-3 px-4 mb-6">
      {onBack && <button onClick={onBack} className={classNames("mt-1 h-8 w-8 rounded-full border flex items-center justify-center transition", light ? "border-slate-200 bg-white text-slate-700 active:bg-slate-50" : "border-white/10 bg-white/10 text-white active:bg-white/20")}><ArrowLeft className="h-4 w-4" /></button>}
      <div className="min-w-0">
        <div className={classNames("text-xl font-black truncate", light ? "text-[#10233c]" : "text-white")}>{title}</div>
        {subtitle && <div className={classNames("text-[11px] font-bold mt-0.5", light ? "text-slate-500" : "text-slate-300")}>{subtitle}</div>}
      </div>
    </div>
  );
}

function SurfaceCard({ children, className = "", dark = false }) {
  return (
    <div className={classNames("rounded-[24px] border p-4 shadow-sm", dark ? "bg-white/10 border-white/10 text-white backdrop-blur" : "bg-white border-slate-200 text-[#11284f]", className)}>
      {children}
    </div>
  );
}

// --- 各画面コンポーネント ---

function HomeScreen({ selectedAnimal, onSelectAnimal, onTabSelect }) {
  return (
    <div className="h-full bg-[linear-gradient(180deg,#08203b_0%,#10375e_100%)] text-white overflow-y-auto pb-24 hide-scrollbar">
      <StatusBar />
      <div className="px-4 mt-6">
        <div className="flex items-center justify-between">
          <div className="text-xl font-black tracking-tight">Aqzoo</div>
          <div className="h-9 w-9 rounded-full bg-white/10 flex items-center justify-center border border-white/10"><Bell className="h-4 w-4" /></div>
        </div>
        <div className="mt-8 p-6 rounded-[32px] bg-white/10 border border-white/10 backdrop-blur shadow-xl">
          <div className="text-3xl font-black leading-tight">あなたの「推し」を、<br/>毎月応援できる。</div>
          <button onClick={() => onTabSelect("discover")} className="mt-6 w-full bg-white text-[#08203b] py-3.5 rounded-[18px] font-black text-sm shadow-lg active:scale-95 transition">生きものを探す</button>
        </div>
        <div className="mt-8"><ArtCanvas animal={selectedAnimal} label={`${selectedAnimal.nickname} の近況`} /></div>
        <div className="mt-8 grid grid-cols-2 gap-3">
          {animals.slice(0, 4).map(a => (
            <button key={a.id} onClick={() => onSelectAnimal(a.id)} className="text-left rounded-[24px] bg-white/5 border border-white/5 p-2 backdrop-blur transition active:scale-95">
              <ArtCanvas animal={a} label={a.name} compact />
              <div className="mt-2 px-1">
                <div className="text-[11px] font-black truncate">{findFacility(a.facilityId)?.name}</div>
                <div className="text-[9px] text-slate-400 mt-0.5">{formatYen(a.price)} / 月〜</div>
              </div>
            </button>
          ))}
        </div>
      </div>
      <BottomNav active="home" onSelect={onTabSelect} />
    </div>
  );
}

function DiscoverScreen({ step, category, facilityId, onSelectCategory, onSelectFacility, onSelectAnimal, onTabSelect, onBack }) {
  const filteredFacilities = facilities.filter(f => f.category === category);
  const filteredAnimals = animals.filter(a => a.facilityId === facilityId);
  
  const bgClass = category === "aquarium" ? "bg-[linear-gradient(180deg,#004e92_0%,#000428_100%)]" : category === "zoo" ? "bg-[linear-gradient(180deg,#134e5e_0%,#71b280_100%)]" : "bg-[#f7fbff]";

  return (
    <div className={classNames("h-full pb-24 overflow-y-auto hide-scrollbar transition-colors duration-500", bgClass)}>
      <StatusBar light={!category} />
      <ScreenHeader title={step === "category" ? "さがす" : step === "facility" ? (category === "aquarium" ? "水族館を選ぶ" : "動物園を選ぶ") : findFacility(facilityId)?.name} subtitle={step === "category" ? "施設の種類から選ぶ" : step === "facility" ? "気になる施設を選んでください" : "この施設で暮らす仲間たち"} onBack={onBack} light={!category} />
      <div className="px-4">
        {step === "category" && (
          <div className="grid gap-4 mt-4">
            <button onClick={() => onSelectCategory("aquarium")} className="relative h-40 overflow-hidden rounded-[32px] bg-gradient-to-br from-blue-600 to-cyan-400 p-6 text-left text-white shadow-lg active:scale-95 transition"><Waves className="absolute -right-4 -top-4 h-32 w-32 opacity-20" /><div className="text-2xl font-black">水族館</div></button>
            <button onClick={() => onSelectCategory("zoo")} className="relative h-40 overflow-hidden rounded-[32px] bg-gradient-to-br from-emerald-600 to-lime-400 p-6 text-left text-white shadow-lg active:scale-95 transition"><Trees className="absolute -right-4 -top-4 h-32 w-32 opacity-20" /><div className="text-2xl font-black">動物園</div></button>
          </div>
        )}
        {step === "facility" && (
          <div className="grid gap-3">
            {filteredFacilities.map(f => (
              <button key={f.id} onClick={() => onSelectFacility(f.id)} className="flex items-center gap-4 rounded-[28px] bg-white/10 border border-white/20 p-5 text-left backdrop-blur-md text-white shadow-xl active:scale-95 transition">
                <div className="h-12 w-12 rounded-2xl bg-white/20 flex items-center justify-center"><Building2 className="h-6 w-6" /></div>
                <div className="flex-1 min-w-0"><div className="text-base font-black">{f.name}</div><div className="mt-1 flex items-center gap-1 text-[11px] opacity-70"><MapPin className="h-3 w-3" />{f.location}</div></div>
                <ChevronRight className="h-5 w-5 opacity-40" />
              </button>
            ))}
          </div>
        )}
        {step === "animal" && (
          <div className="grid gap-4">
            {filteredAnimals.map(a => (
              <button key={a.id} onClick={() => onSelectAnimal(a.id)} className="flex items-center gap-4 rounded-[28px] bg-white/10 border border-white/20 p-4 text-left backdrop-blur-md text-white shadow-xl active:scale-95 transition">
                <div className="w-24 shrink-0"><ArtCanvas animal={a} label={a.name} compact /></div>
                <div className="flex-1 min-w-0">
                  <div className="text-[10px] font-black text-cyan-200 uppercase tracking-wider">{findFacility(a.facilityId)?.name}</div>
                  <div className="mt-1 text-lg font-black leading-tight">{findFacility(a.facilityId)?.name}の{a.name}</div>
                </div>
              </button>
            ))}
          </div>
        )}
      </div>
      <BottomNav active="discover" onSelect={onTabSelect} />
    </div>
  );
}

function ReportsScreen({ onTabSelect }) {
  return (
    <div className="h-full bg-[#f7fbff] pb-24 overflow-y-auto hide-scrollbar">
      <StatusBar light />
      <ScreenHeader title="活動レポート" subtitle="写真、記録、近況を追えます。" />
      <div className="px-4 grid gap-4">
        {reports.map(r => {
          const a = findAnimal(r.animalId);
          return (
            <SurfaceCard key={r.id} className="flex gap-4 p-5">
              <div className="w-24 shrink-0"><ArtCanvas animal={a} label={a.name} compact /></div>
              <div className="flex-1 min-w-0">
                <div className="text-[9px] font-black text-[#5a78b5] uppercase tracking-widest">{r.category} • {r.date}</div>
                <div className="mt-1 text-sm font-black text-[#11284f]">{r.title}</div>
                <p className="mt-1 text-[11px] text-slate-500 leading-relaxed">{r.excerpt}</p>
              </div>
            </SurfaceCard>
          );
        })}
      </div>
      <BottomNav active="reports" onSelect={onTabSelect} />
    </div>
  );
}

function MemberScreen({ supportedAnimalId, onTabSelect }) {
  const animal = findAnimal(supportedAnimalId) || animals[0];
  const facility = findFacility(animal.facilityId);
  return (
    <div className="h-full bg-[#f7fbff] pb-24 overflow-y-auto hide-scrollbar">
      <StatusBar light />
      <ScreenHeader title="会員証" subtitle="応援プランの確認と現地特典" />
      <div className="px-4">
        <div className="rounded-[30px] bg-gradient-to-br from-[#08203b] via-[#143d70] to-[#081a30] p-7 text-white shadow-2xl relative overflow-hidden">
          <div className="flex justify-between items-start">
            <div><div className="text-2xl font-black">Aqzoo</div><div className="text-[10px] opacity-60 mt-1 uppercase tracking-widest">Supporter Card</div></div>
            <div className="rounded-full bg-emerald-500/20 px-3 py-1 text-[9px] font-black border border-emerald-500/30 text-emerald-400">ACTIVE</div>
          </div>
          <div className="mt-12 flex justify-between items-end">
            <div><div className="text-xl font-black">山田 太郎</div><div className="text-[11px] opacity-60 mt-1">ID: AQZ-998822</div><div className="text-[11px] text-cyan-200 mt-3 font-black">{facility.name}の{animal.name}を応援中</div></div>
            <div className="bg-white p-3 rounded-2xl text-[#08203b] shadow-xl"><QrCode className="h-12 w-12" /></div>
          </div>
        </div>
      </div>
      <BottomNav active="member" onSelect={onTabSelect} />
    </div>
  );
}

function MyPageScreen({ followedAnimals, supportedAnimals, onSelectAnimal, onTabSelect }) {
  return (
    <div className="h-full bg-[#f7fbff] pb-24 overflow-y-auto hide-scrollbar">
      <StatusBar light />
      <ScreenHeader title="マイページ" subtitle="あなたのお気に入り・応援状況" />
      <div className="px-4">
        <div className="rounded-[32px] bg-gradient-to-br from-[#08203b] to-[#1656d9] p-6 text-white shadow-xl flex items-center gap-5">
          <div className="h-16 w-16 rounded-2xl bg-white/20 flex items-center justify-center shadow-inner"><User className="h-9 w-9" /></div>
          <div><div className="text-xl font-black">山田 太郎さん</div><div className="text-[11px] opacity-70 mt-1">サポーター会員 ID: 000345</div></div>
        </div>

        {/* 応援中の生きものセクション */}
        <div className="mt-10">
          <div className="flex items-center justify-between mb-5">
            <div className="text-xs font-black text-slate-400 uppercase tracking-widest">応援中の生きもの</div>
            <div className="text-[10px] font-black text-[#1656d9] bg-[#eaf1ff] px-2 py-0.5 rounded-full">{supportedAnimals.length}件</div>
          </div>
          <div className="grid gap-4">
            {supportedAnimals.length > 0 ? supportedAnimals.map(a => (
              <button key={a.id} onClick={() => onSelectAnimal(a.id)} className="flex items-center gap-4 rounded-[28px] border-2 border-[#1656d9] bg-white p-4 text-left shadow-md transition active:scale-[0.98]">
                <div className="w-20 shrink-0"><ArtCanvas animal={a} label={a.name} compact /></div>
                <div className="flex-1 min-w-0">
                  <div className="text-[10px] font-black text-[#1656d9] uppercase tracking-wider">{findFacility(a.facilityId)?.name}</div>
                  <div className="text-base font-black text-[#11284f] leading-tight">{findFacility(a.facilityId)?.name}の{a.name}</div>
                  <div className="mt-2 inline-flex items-center gap-1 text-[10px] font-black text-[#1656d9] bg-[#eaf1ff] px-2 py-0.5 rounded-full">応援中</div>
                </div>
                <ChevronRight className="h-5 w-5 text-[#1656d9]" />
              </button>
            )) : <div className="p-8 text-center text-slate-400 text-xs font-bold border-2 border-dashed border-slate-200 rounded-[32px] bg-slate-50/50">応援中の生きものはいません</div>}
          </div>
        </div>

        {/* 推しにしている生きものセクション */}
        <div className="mt-10">
          <div className="flex items-center justify-between mb-5">
            <div className="text-xs font-black text-slate-400 uppercase tracking-widest">推しにしている生きもの</div>
            <div className="text-[10px] font-black text-slate-400 bg-slate-100 px-2 py-0.5 rounded-full">{followedAnimals.length}件</div>
          </div>
          <div className="grid gap-4">
            {followedAnimals.length > 0 ? followedAnimals.map(a => (
              <button key={a.id} onClick={() => onSelectAnimal(a.id)} className="flex items-center gap-4 rounded-[28px] border border-slate-200 bg-white p-4 text-left shadow-sm transition active:scale-[0.98]">
                <div className="w-20 shrink-0"><ArtCanvas animal={a} label={a.name} compact /></div>
                <div className="flex-1 min-w-0">
                  <div className="text-[10px] font-black text-[#1656d9] uppercase tracking-wider">{findFacility(a.facilityId)?.name}</div>
                  <div className="text-base font-black text-[#11284f] leading-tight">{findFacility(a.facilityId)?.name}の{a.name}</div>
                </div>
                <ChevronRight className="h-5 w-5 text-slate-200" />
              </button>
            )) : <div className="p-8 text-center text-slate-400 text-xs font-bold border-2 border-dashed border-slate-200 rounded-[32px] bg-slate-50/50">推しの生きものはいません</div>}
          </div>
        </div>
      </div>
      <BottomNav active="mypage" onSelect={onTabSelect} />
    </div>
  );
}

function DetailScreen({ animal, followed, onToggleFollow, onOpenSupport, onBack }) {
  const facility = findFacility(animal.facilityId);
  return (
    <div className="h-full bg-[#f7fbff] overflow-y-auto pb-8 hide-scrollbar">
      <StatusBar light />
      <ScreenHeader title="生き物詳細" subtitle={`${facility.name}の仲間`} onBack={onBack} />
      <div className="px-4 mt-4">
        <ArtCanvas animal={animal} label={facility.name} />
        <div className="mt-6 flex items-start justify-between">
          <div><div className="text-2xl font-black text-[#10233c] leading-tight">{facility.name}の<br/>{animal.name}</div><div className="mt-2 text-sm font-bold text-slate-500">{animal.nickname}</div></div>
          <button onClick={onToggleFollow} className={classNames("h-12 w-12 rounded-full border flex items-center justify-center transition active:scale-90", followed ? "border-[#ffd2ca] bg-[#fff0ec] text-[#ff7f68] shadow-sm" : "border-slate-200 bg-white text-slate-400")}><Heart className={classNames("h-6 w-6", followed ? "fill-current" : "")} /></button>
        </div>
        <SurfaceCard className="mt-8 p-6 shadow-md"><div className="text-[10px] font-black text-[#5a78b5] uppercase tracking-widest mb-3">概要</div><p className="text-sm leading-7 text-slate-600">{animal.summary}</p></SurfaceCard>
        <button onClick={onOpenSupport} className="mt-8 w-full rounded-[22px] bg-[#1656d9] py-5 text-base font-black text-white shadow-xl active:scale-95 transition">この子を応援する</button>
      </div>
    </div>
  );
}

function SupportScreen({ animal, selectedPlanId, onSelectPlan, onBack, onConfirm }) {
  return (
    <div className="h-full bg-[#f7fbff] overflow-y-auto pb-8 hide-scrollbar">
      <StatusBar light />
      <ScreenHeader title="応援プランを選択" subtitle={`${findFacility(animal.facilityId).name}の${animal.name}`} onBack={onBack} />
      <div className="px-4 mt-6">
        <SurfaceCard className="flex items-center gap-4 mb-8 p-5">
          <div className="w-20 shrink-0"><ArtCanvas animal={animal} label={animal.name} compact /></div>
          <div><div className="text-base font-black text-[#11284f]">{animal.name}を応援</div><div className="text-[11px] text-slate-500 mt-1">あなたの支援が暮らしを支えます</div></div>
        </SurfaceCard>
        <div className="grid gap-4">
          {supportPlans.map(plan => (
            <button key={plan.id} onClick={() => onSelectPlan(plan.id)} className={classNames("rounded-[28px] border p-6 text-left transition relative overflow-hidden", plan.id === selectedPlanId ? "border-[#1656d9] bg-[#eff5ff] shadow-md" : "border-slate-200 bg-white shadow-sm")}>
              <div className="flex justify-between items-start relative z-10">
                <div><div className="text-xl font-black text-[#11284f]">{plan.label}</div><div className="text-base font-black text-[#173e72] mt-1">{plan.title}</div><div className="text-[12px] text-slate-500 mt-3 leading-relaxed">{plan.perks}</div></div>
                {plan.recommended && <div className="rounded-full bg-[#1656d9] px-3 py-1 text-[10px] font-black text-white shadow-sm">おすすめ</div>}
              </div>
            </button>
          ))}
        </div>
        <button onClick={onConfirm} className="mt-10 w-full rounded-[22px] bg-[#1656d9] py-5 text-base font-black text-white shadow-2xl active:scale-95 transition">応援を確定する</button>
      </div>
    </div>
  );
}

function SupportSuccessScreen({ animal, onTabSelect }) {
  return (
    <div className="h-full bg-white flex flex-col items-center justify-center px-10 text-center">
      <div className="h-24 w-24 bg-emerald-50 rounded-full flex items-center justify-center text-emerald-500 mb-8 shadow-inner"><CheckCircle2 className="h-12 w-12" /></div>
      <div className="text-3xl font-black text-[#10233c] mb-4 tracking-tight">応援が完了しました！</div>
      <p className="text-sm text-slate-500 leading-relaxed mb-12">{findFacility(animal.facilityId).name}の{animal.name}のサポーターになりました。</p>
      <button onClick={() => onTabSelect("home")} className="w-full rounded-[22px] bg-[#1656d9] py-5 text-base font-black text-white mb-4 shadow-xl active:scale-95 transition">ホームに戻る</button>
      <button onClick={() => onTabSelect("reports")} className="w-full rounded-[22px] border-2 border-slate-100 py-5 text-base font-black text-slate-500 active:bg-slate-50 transition">レポートを見る</button>
    </div>
  );
}

// --- メインアプリケーション ---
function App() {
  const [stack, setStack] = React.useState(["home"]);
  const [searchStep, setSearchStep] = React.useState("category");
  const [searchCategory, setSearchCategory] = React.useState(null);
  const [searchFacilityId, setSearchFacilityId] = React.useState(null);
  const [selectedAnimalId, setSelectedAnimalId] = React.useState("penguin-1");
  const [followedIds, setFollowedIds] = React.useState(["penguin-1", "otter-1"]);
  const [supportedIds, setSupportedIds] = React.useState(["penguin-1"]); // 初期状態で1匹応援中
  const [selectedPlanId, setSelectedPlanId] = React.useState("starter");

  const push = (s) => setStack(c => [...c, s]);
  const pop = () => setStack(c => c.slice(0, -1));
  const reset = (s) => { setStack([s]); setSearchStep("category"); setSearchCategory(null); setSearchFacilityId(null); }

  const current = stack[stack.length - 1];
  const animal = findAnimal(selectedAnimalId);
  const followedAnimals = followedIds.map(findAnimal).filter(Boolean);
  const supportedAnimals = supportedIds.map(findAnimal).filter(Boolean);

  let screen = null;
  if (current === "home") screen = <HomeScreen selectedAnimal={animal} onSelectAnimal={(id) => { setSelectedAnimalId(id); push("detail"); }} onTabSelect={reset} />;
  else if (current === "discover") screen = <DiscoverScreen step={searchStep} category={searchCategory} facilityId={searchFacilityId} onSelectCategory={(c) => { setSearchCategory(c); setSearchStep("facility"); }} onSelectFacility={(id) => { setSearchFacilityId(id); setSearchStep("animal"); }} onSelectAnimal={(id) => { setSelectedAnimalId(id); push("detail"); }} onTabSelect={reset} onBack={() => { if (searchStep === "animal") setSearchStep("facility"); else if (searchStep === "facility") setSearchStep("category"); else reset("home"); }} />;
  else if (current === "reports") screen = <ReportsScreen onTabSelect={reset} />;
  else if (current === "member") screen = <MemberScreen supportedAnimalId={supportedIds[0]} onTabSelect={reset} />;
  else if (current === "mypage") screen = <MyPageScreen followedAnimals={followedAnimals} supportedAnimals={supportedAnimals} onSelectAnimal={(id) => { setSelectedAnimalId(id); push("detail"); }} onTabSelect={reset} />;
  else if (current === "detail") screen = <DetailScreen animal={animal} followed={followedIds.includes(selectedAnimalId)} onToggleFollow={() => setFollowedIds(prev => prev.includes(selectedAnimalId) ? prev.filter(i => i !== selectedAnimalId) : [...prev, selectedAnimalId])} onOpenSupport={() => push("support")} onBack={pop} />;
  else if (current === "support") screen = <SupportScreen animal={animal} selectedPlanId={selectedPlanId} onSelectPlan={setSelectedPlanId} onBack={pop} onConfirm={() => { setSupportedIds(prev => [...new Set([...prev, selectedAnimalId])]); push("support-success"); }} />;
  else if (current === "support-success") screen = <SupportSuccessScreen animal={animal} onTabSelect={reset} />;

  return <div className="min-h-screen flex items-center justify-center py-10"><PhoneFrame>{screen}</PhoneFrame></div>;
}

createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
