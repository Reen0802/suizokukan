<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aqzoo | 推しを毎月応援できるアプリ</title>
    <meta
      name="description"
      content="Aqzooの推し動物応援アプリ。応援プラン、活動レポート、イベント、会員証を1つのHTMLで体験できます。"
    />
    <style>
      :root {
        --bg-top: #031224;
        --bg-mid: #063053;
        --bg-bottom: #0a5a7e;
        --panel: rgba(7, 28, 49, 0.78);
        --panel-strong: rgba(10, 21, 36, 0.92);
        --panel-soft: rgba(255, 255, 255, 0.1);
        --text: #ebf7ff;
        --muted: #9cc2da;
        --line: rgba(255, 255, 255, 0.12);
        --blue: #44baf2;
        --blue-deep: #0f7ed1;
        --mint: #62f5db;
        --gold: #ffd36b;
        --danger: #ff8b7f;
        --shadow: 0 26px 60px rgba(0, 0, 0, 0.28);
        --radius-xl: 28px;
        --radius-lg: 20px;
        --radius-md: 16px;
        --radius-sm: 12px;
        --phone-width: 390px;
        --phone-height: 840px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
          "Yu Gothic", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top, rgba(115, 216, 255, 0.18), transparent 24%),
          radial-gradient(circle at 20% 20%, rgba(72, 182, 255, 0.18), transparent 28%),
          linear-gradient(180deg, var(--bg-top) 0%, var(--bg-mid) 52%, var(--bg-bottom) 100%);
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        inset: auto auto 8% -8%;
        width: 320px;
        height: 320px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(98, 245, 219, 0.16), transparent 62%);
        filter: blur(18px);
        pointer-events: none;
      }

      body::after {
        inset: 12% -6% auto auto;
        width: 380px;
        height: 380px;
        background: radial-gradient(circle, rgba(68, 186, 242, 0.18), transparent 64%);
      }

      .ocean-layer,
      .ocean-layer::before,
      .ocean-layer::after {
        position: fixed;
        left: 0;
        right: 0;
        pointer-events: none;
      }

      .ocean-layer {
        top: 0;
        height: 140px;
        background:
          linear-gradient(180deg, rgba(113, 220, 255, 0.26), transparent),
          radial-gradient(circle at 20% 0%, rgba(255, 255, 255, 0.18), transparent 30%);
        opacity: 0.9;
      }

      .ocean-layer::before,
      .ocean-layer::after {
        content: "";
        top: 0;
        height: 100%;
        background-repeat: repeat-x;
        background-size: 240px 80px;
        animation: wave 14s linear infinite;
      }

      .ocean-layer::before {
        background-image:
          radial-gradient(circle at 40px 45px, rgba(255, 255, 255, 0.18) 0 26px, transparent 27px),
          radial-gradient(circle at 140px 30px, rgba(255, 255, 255, 0.14) 0 20px, transparent 21px);
        opacity: 0.34;
      }

      .ocean-layer::after {
        background-image:
          radial-gradient(circle at 60px 54px, rgba(255, 255, 255, 0.1) 0 22px, transparent 23px),
          radial-gradient(circle at 190px 18px, rgba(255, 255, 255, 0.12) 0 16px, transparent 17px);
        animation-duration: 20s;
        animation-direction: reverse;
        opacity: 0.28;
      }

      .bubble-field {
        position: fixed;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
      }

      .bubble {
        position: absolute;
        bottom: -80px;
        width: var(--size);
        height: var(--size);
        left: var(--left);
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.2);
        background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.32), transparent 58%);
        opacity: 0;
        animation: bubble var(--duration) linear infinite;
        animation-delay: var(--delay);
      }

      #app {
        position: relative;
        z-index: 1;
      }

      .shell {
        width: min(1220px, calc(100vw - 32px));
        margin: 28px auto;
        display: grid;
        grid-template-columns: minmax(0, 1.15fr) minmax(360px, 430px);
        gap: 24px;
        align-items: start;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-xl);
        box-shadow: var(--shadow);
        backdrop-filter: blur(16px);
      }

      .desktop {
        padding: 26px;
        min-height: calc(var(--phone-height) + 20px);
        display: grid;
        grid-template-rows: auto auto 1fr;
        gap: 18px;
      }

      .desktop-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .brand-mark,
      .mini-mark,
      .nav-icon,
      .shortcut-icon,
      .section-icon {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border-radius: 999px;
        font-weight: 700;
      }

      .brand-mark {
        width: 44px;
        height: 44px;
        background: linear-gradient(135deg, #8fe8ff, #0f8fe3);
        color: #042540;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
      }

      .brand h1,
      .phone-brand h2,
      .section-title {
        margin: 0;
      }

      .brand h1 {
        font-size: 22px;
        letter-spacing: 0.02em;
      }

      .brand p,
      .mini-copy,
      .kicker,
      .report-meta,
      .animal-meta,
      .event-meta,
      .rank-caption,
      .notice-meta,
      .support-meta,
      .detail-summary,
      .fact-label,
      .progress-meta,
      .empty-text {
        margin: 0;
        color: var(--muted);
      }

      .brand p,
      .mini-copy,
      .rank-caption,
      .empty-text {
        font-size: 13px;
      }

      .mini-badge {
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-size: 12px;
        white-space: nowrap;
      }

      .hero {
        position: relative;
        overflow: hidden;
        padding: 28px;
        background:
          linear-gradient(135deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0)),
          var(--hero-gradient);
        border-radius: 26px;
        min-height: 290px;
      }

      .hero::before,
      .hero::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        filter: blur(2px);
      }

      .hero::before {
        width: 280px;
        height: 280px;
        right: -60px;
        top: -80px;
      }

      .hero::after {
        width: 180px;
        height: 180px;
        left: -40px;
        bottom: -80px;
        background: rgba(98, 245, 219, 0.08);
      }

      .hero-layout {
        position: relative;
        z-index: 1;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 240px;
        gap: 20px;
        align-items: end;
      }

      .hero-copy {
        display: grid;
        gap: 14px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        width: fit-content;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        font-size: 12px;
        letter-spacing: 0.08em;
      }

      .hero h3 {
        margin: 0;
        font-size: clamp(30px, 4vw, 48px);
        line-height: 1.15;
      }

      .hero p {
        margin: 0;
        max-width: 560px;
        color: #d9f4ff;
        line-height: 1.8;
      }

      .hero-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      .button,
      .ghost-button,
      .chip,
      .plan,
      .nav-item,
      .animal-card,
      .list-card,
      .notice-item,
      .report-item,
      .event-item,
      .rank-item,
      .selector {
        border: 0;
        color: inherit;
        font: inherit;
      }

      .button,
      .ghost-button,
      .selector {
        cursor: pointer;
      }

      .button {
        padding: 14px 18px;
        border-radius: 14px;
        background: linear-gradient(135deg, #7ee7ff, #168de7);
        color: #042540;
        font-weight: 800;
        box-shadow: 0 14px 26px rgba(10, 136, 210, 0.26);
      }

      .ghost-button {
        padding: 14px 18px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        background: rgba(255, 255, 255, 0.06);
        color: var(--text);
        font-weight: 700;
      }

      .hero-art {
        position: relative;
        min-height: 238px;
        border-radius: 24px;
        overflow: hidden;
        background:
          radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.16), transparent 24%),
          radial-gradient(circle at 68% 30%, rgba(255, 255, 255, 0.14), transparent 26%),
          linear-gradient(180deg, rgba(0, 0, 0, 0.06), rgba(0, 0, 0, 0.18));
        border: 1px solid rgba(255, 255, 255, 0.16);
        display: flex;
        align-items: end;
        justify-content: space-between;
        padding: 18px;
      }

      .creature {
        position: absolute;
        inset: auto auto 20px 18px;
        width: 126px;
        height: 168px;
        border-radius: 48% 48% 44% 44%;
        background: linear-gradient(180deg, #ffffff, #9ec7df 60%, #0f2336 100%);
        box-shadow: inset 0 0 0 10px rgba(5, 16, 28, 0.28);
        transform: rotate(-7deg);
      }

      .creature::before {
        content: "";
        position: absolute;
        inset: 18px 34px 28px 34px;
        border-radius: 40px;
        background: linear-gradient(180deg, #11283a, #09131d);
      }

      .creature::after {
        content: "";
        position: absolute;
        width: 26px;
        height: 14px;
        top: 54px;
        right: 12px;
        border-radius: 12px;
        background: linear-gradient(135deg, #ffdf7d, #e18823);
      }

      .art-caption {
        position: relative;
        z-index: 1;
        margin-left: auto;
        text-align: right;
        max-width: 140px;
      }

      .art-caption strong {
        display: block;
        font-size: 28px;
        line-height: 1.1;
      }

      .desktop-grid {
        display: grid;
        grid-template-columns: 1.1fr 0.9fr;
        gap: 18px;
        min-height: 0;
      }

      .stack {
        display: grid;
        gap: 18px;
      }

      .section-card,
      .info-card {
        padding: 20px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      .section-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .section-title {
        font-size: 18px;
      }

      .section-icon {
        width: 30px;
        height: 30px;
        background: rgba(126, 231, 255, 0.16);
        color: #baf4ff;
        font-size: 13px;
      }

      .selector-row,
      .chip-row,
      .shortcut-row,
      .plan-list,
      .facts,
      .nav {
        display: flex;
        gap: 10px;
      }

      .selector-row,
      .chip-row,
      .shortcut-row {
        flex-wrap: wrap;
      }

      .selector {
        padding: 10px 14px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.12);
        color: var(--muted);
        transition: 0.2s ease;
      }

      .selector.is-active,
      .chip.is-active {
        color: #042540;
        background: linear-gradient(135deg, #7ee7ff, #4fb6f6);
        border-color: transparent;
      }

      .animal-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 12px;
      }

      .animal-card {
        position: relative;
        overflow: hidden;
        padding: 14px;
        min-height: 150px;
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.05), rgba(0, 0, 0, 0.08)),
          var(--animal-gradient);
        border: 1px solid rgba(255, 255, 255, 0.12);
        text-align: left;
        cursor: pointer;
      }

      .animal-card.is-active {
        outline: 2px solid rgba(126, 231, 255, 0.62);
        transform: translateY(-2px);
      }

      .animal-card::after {
        content: attr(data-mark);
        position: absolute;
        right: 10px;
        bottom: -8px;
        font-size: 64px;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: rgba(255, 255, 255, 0.08);
      }

      .animal-card strong,
      .report-item strong,
      .event-item strong,
      .notice-item strong,
      .rank-item strong,
      .support-confirm strong,
      .membership-card strong {
        display: block;
      }

      .animal-price {
        margin-top: 8px;
        font-size: 13px;
        color: #dcf8ff;
      }

      .animal-badge {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.12);
        font-size: 11px;
        margin-top: 10px;
      }

      .facts {
        flex-wrap: wrap;
      }

      .fact {
        min-width: calc(50% - 10px);
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.04);
      }

      .fact-value {
        margin-top: 6px;
        font-size: 14px;
        font-weight: 700;
      }

      .timeline,
      .report-list,
      .event-list,
      .notice-list,
      .ranking-list {
        display: grid;
        gap: 10px;
      }

      .list-card,
      .report-item,
      .event-item,
      .notice-item,
      .rank-item {
        width: 100%;
        padding: 14px;
        text-align: left;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }

      .list-card {
        cursor: default;
      }

      .report-item.is-active,
      .event-item.is-active,
      .notice-item.is-active {
        border-color: rgba(126, 231, 255, 0.34);
        background: rgba(126, 231, 255, 0.1);
      }

      .meta-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .kicker {
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .detail-summary {
        line-height: 1.7;
      }

      .rank-item {
        display: grid;
        grid-template-columns: 32px 1fr auto;
        align-items: center;
        gap: 10px;
        cursor: default;
      }

      .rank-number {
        width: 32px;
        height: 32px;
        border-radius: 12px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 211, 107, 0.18);
        color: #ffe6a8;
        font-weight: 800;
      }

      .phone {
        width: min(var(--phone-width), 100%);
        min-height: var(--phone-height);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .phone-header {
        padding: 18px 18px 12px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0)),
          rgba(4, 18, 34, 0.78);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
      }

      .status-bar,
      .phone-brand,
      .report-topline,
      .membership-top,
      .member-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .status-bar {
        font-size: 12px;
        color: var(--muted);
        margin-bottom: 14px;
      }

      .phone-brand {
        margin-bottom: 12px;
      }

      .mini-mark {
        width: 36px;
        height: 36px;
        background: linear-gradient(135deg, #7ee7ff, #0f8fe3);
        color: #042540;
      }

      .phone-brand h2 {
        font-size: 20px;
      }

      .phone-brand p {
        margin: 2px 0 0;
        font-size: 12px;
        color: var(--muted);
      }

      .phone-body {
        flex: 1;
        overflow-y: auto;
        padding: 18px;
        display: grid;
        gap: 16px;
        scroll-behavior: smooth;
      }

      .phone-body::-webkit-scrollbar {
        width: 8px;
      }

      .phone-body::-webkit-scrollbar-thumb {
        background: rgba(255, 255, 255, 0.12);
        border-radius: 999px;
      }

      .mobile-hero {
        padding: 20px;
        border-radius: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.08)),
          var(--hero-gradient);
        position: relative;
        overflow: hidden;
      }

      .mobile-hero::after {
        content: "";
        position: absolute;
        right: -24px;
        bottom: -34px;
        width: 140px;
        height: 140px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.1);
      }

      .mobile-hero strong {
        font-size: 28px;
        display: block;
        margin: 8px 0 6px;
      }

      .stat-grid,
      .benefit-grid,
      .report-highlights,
      .member-stats {
        display: grid;
        gap: 10px;
      }

      .stat-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .benefit-grid,
      .report-highlights,
      .member-stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat-card,
      .benefit-card,
      .highlight-card,
      .member-stat {
        padding: 14px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .stat-value,
      .member-value {
        display: block;
        margin-top: 8px;
        font-size: 20px;
        font-weight: 800;
      }

      .section-panel {
        padding: 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .section-panel h3,
      .detail-card h3,
      .membership-card h3,
      .support-confirm h3 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .shortcut-row {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .shortcut {
        padding: 14px 10px;
        border-radius: 20px;
        text-align: center;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        cursor: pointer;
      }

      .shortcut-icon {
        width: 40px;
        height: 40px;
        margin: 0 auto 10px;
        background: rgba(126, 231, 255, 0.14);
        color: #baf4ff;
      }

      .shortcut span {
        display: block;
        font-size: 13px;
        font-weight: 700;
      }

      .chip {
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid rgba(255, 255, 255, 0.08);
        color: var(--muted);
        cursor: pointer;
      }

      .plan-list {
        flex-direction: column;
      }

      .plan {
        padding: 16px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
        text-align: left;
        cursor: pointer;
      }

      .plan.is-active {
        border-color: rgba(126, 231, 255, 0.38);
        background: rgba(126, 231, 255, 0.12);
      }

      .plan-price {
        font-size: 24px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      .support-confirm,
      .detail-card,
      .membership-card {
        padding: 18px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }

      .support-confirm {
        background: linear-gradient(180deg, rgba(98, 245, 219, 0.14), rgba(255, 255, 255, 0.04));
      }

      .support-badge {
        display: inline-flex;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(98, 245, 219, 0.14);
        color: #b9fff2;
        font-size: 12px;
        margin-bottom: 10px;
      }

      .membership-card {
        background:
          radial-gradient(circle at top right, rgba(126, 231, 255, 0.2), transparent 36%),
          linear-gradient(160deg, rgba(17, 47, 76, 0.95), rgba(4, 20, 35, 0.95));
      }

      .member-id {
        font-size: 12px;
        color: #c9ebfb;
      }

      .qr {
        width: 74px;
        height: 74px;
        border-radius: 14px;
        background:
          linear-gradient(90deg, #ffffff 10px, transparent 10px) 0 0 / 18px 18px,
          linear-gradient(#ffffff 10px, transparent 10px) 0 0 / 18px 18px,
          linear-gradient(135deg, rgba(255, 255, 255, 0.18), rgba(255, 255, 255, 0.02));
        border: 1px solid rgba(255, 255, 255, 0.22);
      }

      .progress-bar {
        position: relative;
        height: 10px;
        border-radius: 999px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.08);
      }

      .progress-bar span {
        display: block;
        height: 100%;
        width: var(--progress);
        background: linear-gradient(135deg, #7ee7ff, #62f5db);
      }

      .nav {
        padding: 12px 12px 14px;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(4, 16, 29, 0.88);
        justify-content: space-between;
      }

      .nav-item {
        flex: 1;
        background: transparent;
        border-radius: 18px;
        color: var(--muted);
        padding: 10px 6px;
        display: grid;
        justify-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .nav-item.is-active {

                                <strong>${rankedAnimal ? rankedAnimal.name : "-"}</strong>
                                <div class="rank-caption">${rankedAnimal ? rankedAnimal.location : ""}</div>
                              </div>
                              <strong>${money(item.amount)}</strong>
                            </div>
                          `;
                        })
                        .join("")}
                    </div>
                  </section>

                  <section class="info-card">
                    <div class="section-head">
                      <div>
                        <div class="kicker">06 通知・お知らせ</div>
                        <h2 class="section-title">最新ニュース</h2>
                      </div>
                      <span class="section-icon">NT</span>
                    </div>
                    <div class="timeline">
                      ${notices
                        .map(
                          (item) => `
                            <button
                              class="notice-item ${item.id === notice.id ? "is-active" : ""}"
                              data-action="select-notice"
                              data-notice="${item.id}"
                            >
                              <div class="meta-row">
                                <div class="kicker">${item.type}</div>
                                <div class="notice-meta">${item.date}</div>
                              </div>
                              <strong>${item.title}</strong>
                            </button>
                          `,
                        )
                        .join("")}
                    </div>
                  </section>
                </div>
              </div>
            </section>

            <section class="phone panel">
              <div class="phone-header">
                <div class="status-bar">
                  <span>9:41</span>
                  <span>${aquarium.name}</span>
                </div>
                <div class="phone-brand">
                  <div class="brand">
                    <div class="mini-mark">A</div>
                    <div>
                      <h2>Aqzoo</h2>
                      <p>${currentTabLabel()}</p>
                    </div>
                  </div>
                  <div class="mini-badge">${rankLabel()} 会員</div>
                </div>
                <div class="chip-row">
                  ${renderTabChips()}
                </div>
              </div>

              <div class="phone-body">
                ${renderPhoneBody(animal, report, event, notice, highlightReports, progress)}
              </div>

              <nav class="nav">
                ${renderNav()}
              </nav>
            </section>
          </div>
        `;
      }

      function currentTabLabel() {
        const labels = {
          home: "ホーム・トップ",
          support: "応援する",
          reports: "活動レポート",
          events: "施設・体験・イベント",
          mypage: "マイページ・会員証",
        };
        return labels[state.currentTab] || labels.home;
      }

      function renderTabChips() {
        const tabs = [
          ["home", "ホーム"],
          ["support", "応援"],
          ["reports", "レポート"],
          ["events", "イベント"],
          ["mypage", "マイページ"],
        ];

        return tabs
          .map(
            ([id, label]) => `
              <button class="chip ${state.currentTab === id ? "is-active" : ""}" data-action="switch-tab" data-tab="${id}">
                ${label}
              </button>
            `,
          )
          .join("");
      }

      function renderPhoneBody(animal, report, event, notice, highlightReports, progress) {
        if (state.currentTab === "support") {
          return renderSupportTab(animal);
        }

        if (state.currentTab === "reports") {
          return renderReportsTab(report);
        }

        if (state.currentTab === "events") {
          return renderEventsTab(event);
        }

        if (state.currentTab === "mypage") {
          return renderMyPageTab(notice, progress);
        }

        return `
          <section class="mobile-hero" style="--hero-gradient: ${animal.gradient}">
            <div class="kicker">毎月の推し活サポート</div>
            <strong>${animal.name} を見守ろう</strong>
            <p class="detail-summary">${animal.summary}</p>
            <div class="hero-actions" style="margin-top: 14px;">
              <button class="button" data-action="switch-tab" data-tab="support">応援プランを見る</button>
              <button class="ghost-button" data-action="select-animal" data-animal="${animals[(animals.findIndex((item) => item.id === animal.id) + 1) % animals.length].id}">次の生き物へ</button>
            </div>
          </section>

          <section class="stat-grid">
            <div class="stat-card">
              <div class="kicker">月額応援</div>
              <span class="stat-value">${money(totalMonthlySupport())}</span>
            </div>
            <div class="stat-card">
              <div class="kicker">推し登録</div>
              <span class="stat-value">${supportCount()}件</span>
            </div>
            <div class="stat-card">
              <div class="kicker">会員ランク</div>
              <span class="stat-value">${rankLabel()}</span>
            </div>
          </section>

          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">おすすめの生き物</div>
                <h3>${animal.name} を中心にチェック</h3>
              </div>
              <span class="section-icon">AN</span>
            </div>
            <div class="animal-grid">
              ${animals
                .slice(0, 4)
                .map(
                  (item) => `
                    <button
                      class="animal-card ${item.id === animal.id ? "is-active" : ""}"
                      style="--animal-gradient: ${item.gradient}"
                      data-mark="${item.mark}"
                      data-action="select-animal"
                      data-animal="${item.id}"
                    >
                      <strong>${item.name}</strong>
                      <div class="animal-meta">${formatPlan(item.price)} から</div>
                      <span class="animal-badge">${item.badge}</span>
                    </button>
                  `,
                )
                .join("")}
            </div>
          </section>

          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">主なナビゲーション</div>
                <h3>最短でやりたいことへ</h3>
              </div>
              <span class="section-icon">GO</span>
            </div>
            <div class="shortcut-row">
              <button class="shortcut" data-action="switch-tab" data-tab="support">
                <div class="shortcut-icon">応</div>
                <span>応援する</span>
              </button>
              <button class="shortcut" data-action="switch-tab" data-tab="reports">
                <div class="shortcut-icon">活</div>
                <span>活動レポート</span>
              </button>
              <button class="shortcut" data-action="switch-tab" data-tab="events">
                <div class="shortcut-icon">催</div>
                <span>イベント</span>
              </button>
            </div>
          </section>

          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">最近の活動レポート</div>
                <h3>応援の成果を確認</h3>
              </div>
              <span class="section-icon">RP</span>
            </div>
            <div class="report-highlights">
              ${highlightReports
                .map(
                  (item) => `
                    <button class="highlight-card" data-action="open-report" data-report="${item.id}">
                      <div class="report-meta">${item.date}</div>
                      <strong>${item.title}</strong>
                      <p class="detail-summary">${item.excerpt}</p>
                    </button>
                  `,
                )
                .join("")}
            </div>
          </section>

          <section class="benefit-grid">
            <div class="benefit-card">
              <div class="kicker">特典</div>
              <strong>限定レポート</strong>
              <p class="detail-summary">毎月の観察記録や写真付きレポートを会員向けに配信します。</p>
            </div>
            <div class="benefit-card">
              <div class="kicker">コミュニティ</div>
              <strong>みんなの応援</strong>
              <p class="detail-summary">${comments[0]}</p>
            </div>
          </section>
        `;
      }

      function renderSupportTab(animal) {
        const lastSupport = [...state.supports].reverse().find((entry) => entry.animalId === animal.id);

        return `
          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">応援プランを選択</div>
                <h3>${animal.name}</h3>
              </div>
              <span class="section-icon">SP</span>
            </div>
            <p class="detail-summary">${animal.summary}</p>
            <div class="plan-list">
              ${plans
                .map(
                  (plan) => `
                    <button
                      class="plan ${state.selectedPlanAmount === plan.amount ? "is-active" : ""}"
                      data-action="pick-plan"
                      data-plan="${plan.amount}"
                    >
                      <div class="plan-price">${formatPlan(plan.amount)}</div>
                      <strong>${plan.title}</strong>
                      <div class="support-meta">${plan.description}</div>
                    </button>
                  `,
                )
                .join("")}
            </div>
            <div class="hero-actions" style="margin-top: 16px;">
              <button class="button" data-action="complete-support">このプランで応援する</button>
              <button class="ghost-button" data-action="switch-tab" data-tab="reports">活動レポートへ</button>
            </div>
          </section>

          <section class="support-confirm">
            <div class="support-badge">応援履歴</div>
            <h3>${lastSupport ? "直近の応援が反映されています" : "まだこの生き物の応援はありません"}</h3>
            ${
              lastSupport
                ? `
                    <strong>${animal.name} / ${formatPlan(lastSupport.amount)}</strong>
                    <p class="detail-summary">応援日: ${lastSupport.date}</p>
                    <p class="detail-summary">累計応援額: ${money(totalSupportForAnimal(animal.id))}</p>
                  `
                : `<p class="detail-summary">プランを選ぶと、ここに応援完了の履歴が表示されます。</p>`
            }
          </section>

          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">みんなの応援</div>
                <h3>今月のランキング</h3>
              </div>
              <span class="section-icon">RK</span>
            </div>
            <div class="ranking-list">
              ${ranking
                .slice(0, 3)
                .map((item, index) => {
                  const rankedAnimal = animals.find((animalItem) => animalItem.id === item.animalId);
                  return `
                    <div class="rank-item">
                      <div class="rank-number">${index + 1}</div>
                      <div>
                        <strong>${rankedAnimal ? rankedAnimal.name : "-"}</strong>
                        <div class="rank-caption">${comments[index]}</div>
                      </div>
                      <strong>${money(item.amount)}</strong>
                    </div>
                  `;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function renderReportsTab(report) {
        const filtered = filteredReports();

        return `
          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">活動レポート</div>
                <h3>応援の成果記録</h3>
              </div>
              <span class="section-icon">RP</span>
            </div>
            <div class="chip-row" style="margin-bottom: 12px;">
              ${[
                ["all", "すべて"],
                ["mine", "推し"],
                ["health", "健康"],
                ["activity", "行動"],
                ["photo", "写真"],
              ]
                .map(
                  ([id, label]) => `
                    <button class="chip ${state.reportFilter === id ? "is-active" : ""}" data-action="filter-report" data-filter="${id}">
                      ${label}
                    </button>
                  `,
                )
                .join("")}
            </div>
            <div class="report-list">
              ${
                filtered.length
                  ? filtered
                      .map(
                        (item) => `
                          <button
                            class="report-item ${item.id === report.id ? "is-active" : ""}"
                            data-action="open-report"
                            data-report="${item.id}"
                          >
                            <div class="meta-row">
                              <div class="kicker">${item.category}</div>
                              <div class="report-meta">${item.date}</div>
                            </div>
                            <strong>${item.title}</strong>
                            <p class="detail-summary">${item.excerpt}</p>
                          </button>
                        `,
                      )
                      .join("")
                  : `<div class="empty-text">この条件に合うレポートはまだありません。</div>`
              }
            </div>
          </section>

          <section class="detail-card">
            <div class="report-topline">
              <div>
                <div class="kicker">レポート詳細</div>
                <h3>${report.title}</h3>
              </div>
              <div class="mini-badge">${report.date}</div>
            </div>
            <p class="detail-summary">${report.detail}</p>
          </section>
        `;
      }

      function renderEventsTab(event) {
        return `
          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">施設・体験・イベント</div>
                <h3>会員向けイベント</h3>
              </div>
              <span class="section-icon">EV</span>
            </div>
            <div class="event-list">
              ${events
                .map(
                  (item) => `
                    <button
                      class="event-item ${item.id === event.id ? "is-active" : ""}"
                      data-action="select-event"
                      data-event="${item.id}"
                    >
                      <div class="event-meta">${item.date} / ${item.time}</div>
                      <strong>${item.title}</strong>
                      <p class="detail-summary">${item.summary}</p>
                    </button>
                  `,
                )
                .join("")}
            </div>
          </section>

          <section class="detail-card">
            <div class="kicker">イベント詳細</div>
            <h3>${event.title}</h3>
            <div class="facts">
              <div class="fact">
                <div class="fact-label">日時</div>
                <div class="fact-value">${event.date} / ${event.time}</div>
              </div>
              <div class="fact">
                <div class="fact-label">定員</div>
                <div class="fact-value">${event.capacity}</div>
              </div>
              <div class="fact">
                <div class="fact-label">会場</div>
                <div class="fact-value">${event.place}</div>
              </div>
            </div>
            <p class="detail-summary" style="margin-top: 12px;">${event.summary}</p>
            <div class="hero-actions" style="margin-top: 16px;">
              <button class="button" data-action="switch-tab" data-tab="mypage">会員証を確認する</button>
            </div>
          </section>
        `;
      }

      function renderMyPageTab(notice, progress) {
        return `
          <section class="membership-card">
            <div class="membership-top">
              <div>
                <div class="kicker">会員証</div>
                <h3>デジタルサポーター会員証</h3>
                <strong>山田 太郎</strong>
                <div class="member-id">会員ID: AQ20011345</div>
              </div>
              <div class="qr" aria-hidden="true"></div>
            </div>
            <div class="member-stats" style="margin-top: 16px;">
              <div class="member-stat">
                <div class="kicker">現在のランク</div>
                <span class="member-value">${rankLabel()}</span>
              </div>
              <div class="member-stat">
                <div class="kicker">応援中</div>
                <span class="member-value">${supportCount()}件</span>
              </div>
            </div>
          </section>

          <section class="section-panel">
            <div class="membership-top">
              <div>
                <div class="kicker">会員ランク</div>
                <h3>次のランクまであと少し</h3>
              </div>
              <div class="mini-badge">${money(Math.max(5000 - progress.amount, 0))} でゴールド</div>
            </div>
            <div class="progress-bar" style="margin: 12px 0 8px; --progress: ${progress.progress}%;">
              <span></span>
            </div>
            <div class="progress-meta">累計月額応援 ${money(progress.amount)} / 5,000円</div>
          </section>

          <section class="section-panel">
            <div class="section-head">
              <div>
                <div class="kicker">お気に入りのお知らせ</div>
                <h3>${notice.title}</h3>
              </div>
              <span class="section-icon">NT</span>
            </div>
            <p class="detail-summary">${notice.detail}</p>
            <div class="notice-list" style="margin-top: 12px;">
              ${notices
                .map(
                  (item) => `
                    <button
                      class="notice-item ${item.id === notice.id ? "is-active" : ""}"
                      data-action="select-notice"
                      data-notice="${item.id}"
                    >
                      <div class="meta-row">
                        <div class="kicker">${item.type}</div>
                        <div class="notice-meta">${item.date}</div>
                      </div>
                      <strong>${item.title}</strong>
                    </button>
                  `,
                )
                .join("")}
            </div>
          </section>
        `;
      }

      function renderNav() {
        const items = [
          ["home", "HM", "ホーム"],
          ["support", "SP", "応援"],
          ["reports", "RP", "レポート"],
          ["events", "EV", "イベント"],
          ["mypage", "ME", "マイページ"],
        ];

        return items
          .map(
            ([id, icon, label]) => `
              <button class="nav-item ${state.currentTab === id ? "is-active" : ""}" data-action="switch-tab" data-tab="${id}">
                <span class="nav-icon">${icon}</span>
                <span class="nav-label">${label}</span>
              </button>
            `,
          )
          .join("");
      }

      function handleClick(event) {
        const target = event.target.closest("[data-action]");
        if (!target) {
          return;
        }

        const action = target.dataset.action;

        if (action === "switch-tab") {
          state.currentTab = target.dataset.tab;
          saveState();
          render();
          return;
        }

        if (action === "select-aquarium") {
          state.currentAquariumId = target.dataset.aquarium;
          saveState();
          render();
          return;
        }

        if (action === "select-animal") {
          state.currentAnimalId = target.dataset.animal;
          if (state.reportFilter === "mine") {
            const currentFiltered = filteredReports();
            state.currentReportId = currentFiltered[0] ? currentFiltered[0].id : reports[0].id;
          }
          saveState();
          render();
          return;
        }

        if (action === "pick-plan") {
          state.selectedPlanAmount = Number(target.dataset.plan);
          saveState();
          render();
          return;
        }

        if (action === "complete-support") {
          state.supports.push({
            animalId: state.currentAnimalId,
            amount: state.selectedPlanAmount,
            date: new Date().toLocaleDateString("ja-JP").split("/").join("."),
          });
          saveState();
          render();
          return;
        }

        if (action === "filter-report") {
          state.reportFilter = target.dataset.filter;
          const nextReport = filteredReports()[0];
          if (nextReport) {
            state.currentReportId = nextReport.id;
          }
          saveState();
          render();
          return;
        }

        if (action === "open-report") {
          state.currentReportId = target.dataset.report;
          state.currentTab = "reports";
          saveState();
          render();
          return;
        }

        if (action === "select-event") {
          state.currentEventId = target.dataset.event;
          saveState();
          render();
          return;
        }

        if (action === "select-notice") {
          state.currentNoticeId = target.dataset.notice;
          saveState();
          render();
        }
      }
    </script>
  </body>
</html>
