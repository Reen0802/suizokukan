function classNames(...values) {
  return values.filter(Boolean).join(" ");
}

function formatYen(value) {
  return `${value.toLocaleString("ja-JP")}円`;
}

function PhoneFrame({ children }) {

    <div className="w-full max-w-[408px] rounded-[44px] border border-white/40 bg-white/65 p-2 shadow-[0_40px_120px_rgba(6,24,46,0.18)] backdrop-blur md:p-3">
      <div className="relative aspect-[390/844] overflow-hidden rounded-[34px] border border-white/70 bg-white h-[844px]">
        {children}
      </div>
    </div>
  );
}

function ScreenBase({ children, className = "", bottomNav }) {
  return (
    <div className={classNames("relative h-full overflow-hidden", className)}>
      <div className={classNames("h-full overflow-y-auto px-4 pt-4 pb-32")}>
        {children}
      </div>
      {bottomNav}
    </div>
  );
}

function StatusBar({ light = false }) {

    <div className={classNames("flex items-center justify-between text-[11px] font-black", light ? "text-slate-900" : "text-white")}>

      </div>
    </div>
  );
}

function ScreenHeader({ title, subtitle, onBack, right, light = true }) {
  return (
    <div className="mt-4 flex items-start justify-between gap-3">
      <div className="flex min-w-0 items-start gap-3">
        {onBack ? (
          <button

        ) : null}

          <div className={classNames("text-2xl font-black tracking-[-0.04em]", light ? "text-[#10233c]" : "text-white")}>

function SurfaceCard({ children, dark = false, className = "" }) {

}

function PrimaryButton({ children, className = "", ...props }) {

    </button>

}

function FilterTabs({ items, active, onSelect, dark = false }) {
  return (
    <div className="mt-4 flex gap-2 overflow-x-auto pb-1">
      {items.map((item) => {
        const isActive = item === active;
        return (
          <button
            key={item}
            type="button"
            onClick={() => onSelect(item)}
            className={classNames("shrink-0 rounded-full px-4 py-2 text-[11px] font-black", isActive ? (dark ? "bg-white text-[#10233c]" : "bg-[#173e72] text-white") : (dark ? "bg-white/10 text-white" : "bg-[#eff5ff] text-[#1656d9]"))}

  );
}

}

            <SurfaceCard key={benefit.title} dark className="rounded-[20px] px-4 py-3">

    <ScreenBase className="bg-[#f7fbff]" bottomNav={<BottomNav active="discover" onSelect={onTabSelect} />}>

      <div className="mt-4 flex items-start justify-between">
        <div>
          <div className="flex items-center gap-2">
            <div className="text-3xl font-black text-[#10233c]">{animal.name}</div>

function SupportScreen({ animal, selectedPlanId, onSelectPlan, onBack, onConfirm }) {

    <ScreenBase className="bg-[#f7fbff]">
      <StatusBar light />
      <ScreenHeader title="プランを選択" subtitle={animal.name} onBack={onBack} />
      <div className="mt-4 grid gap-3">
        {supportPlans.map((plan) => {
          const selected = plan.id === selectedPlanId;
          return (
            <button key={plan.id} type="button" onClick={() => onSelectPlan(plan.id)} className={classNames("rounded-[24px] border p-4 text-left transition", selected ? "border-[#1656d9] bg-[#eff5ff]" : "border-slate-200 bg-white")}>
              <div className="flex justify-between items-start">
                <div>
                  <div className="text-lg font-black text-[#11284f]">{plan.label}</div>
                  <div className="text-xs font-bold text-slate-500">{plan.title}</div>
                </div>
                {plan.recommended && <span className="text-[10px] bg-[#1656d9] text-white px-2 py-0.5 rounded-full">一番人気</span>}
              </div>
            </button>
          );
        })}
      </div>
      <PrimaryButton className="mt-6 w-full" onClick={onConfirm}>次へ進む</PrimaryButton>
    </ScreenBase>
  );

function SupportSuccessScreen({ animal, selectedPlan, onHome }) {
  return (
    <ScreenBase className="bg-white">
      <StatusBar light />
      <div className="flex h-full flex-col items-center justify-center text-center pt-20">
        <div className="flex h-16 w-16 items-center justify-center rounded-full bg-[#e8f8f0] text-emerald-600"><CheckCircle2 className="h-8 w-8" /></div>
        <div className="mt-4 text-2xl font-black text-[#10233c]">応援が完了しました！</div>
        <p className="mt-2 text-xs text-slate-500 px-6">{animal.name}の健やかな日々を一緒に支えていきましょう。</p>
        <SurfaceCard className="mt-6 w-full max-w-[280px] text-left">
          <div className="text-xs text-slate-400">参加プラン</div>

        </SurfaceCard>
        <button onClick={onHome} className="mt-8 text-sm font-bold text-[#1656d9]">ホームへ戻る</button>
      </div>

function App() {
  const [screen, setScreen] = useState("home");
  const [selectedAnimalId, setSelectedAnimalId] = useState("penguin");
  const [selectedPlanId, setSelectedPlanId] = useState("starter");

  const currentAnimal = animals.find((a) => a.id === selectedAnimalId) || animals[0];
  const currentPlan = supportPlans.find((p) => p.id === selectedPlanId);

  const handleTabSelect = (tabKey) => {
    if (tabKey === "home") setScreen("home");
    if (tabKey === "discover") setScreen("discover");
  };

  return (
    <PhoneFrame>
      {screen === "home" && (
        <HomeScreen
          selectedAnimal={currentAnimal}
          onSelectAnimal={(id) => { setSelectedAnimalId(id); setScreen("discover"); }}
          onOpenSupport={() => setScreen("support")}
          onTabSelect={handleTabSelect}
        />
      )}
      {screen === "discover" && (
        <DiscoverScreen
          animal={currentAnimal}
          onOpenSupport={() => setScreen("support")}
          onSelectAnimal={setSelectedAnimalId}
          onTabSelect={handleTabSelect}
        />
      )}
      {screen === "support" && (
        <SupportScreen
          animal={currentAnimal}
          selectedPlanId={selectedPlanId}
          onSelectPlan={setSelectedPlanId}
          onBack={() => setScreen("discover")}
          onConfirm={() => setScreen("success")}
        />
      )}
      {screen === "success" && (
        <SupportSuccessScreen
          animal={currentAnimal}
          selectedPlan={currentPlan}
          onHome={() => setScreen("home")}
        />
      )}
    </PhoneFrame>
  );
}

const root = createRoot(document.getElementById("root"));
root.render(<App />);
    </script>
  </body>
</html>
